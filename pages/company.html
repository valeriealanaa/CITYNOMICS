<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perusahaan CITYNOMICS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
          fontWeight: { black: '600', extrabold: '600', bold: '500', semibold: '500', medium: '450' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/custom.css?v=2">
</head>
<body>
  <header class="topbar">
    <div class="app-shell flex items-center justify-between py-5">

      <a class="btn-primary" href="dashboard.html">Kembali ke Dashboard</a>

    <section class="panel p-6">
      <p class="text-xs font-black uppercase text-emerald-600">Company Exploration</p>
